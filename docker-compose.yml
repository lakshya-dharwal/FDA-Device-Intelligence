version: "3.9"

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: fda_device_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/fda_device_intelligence
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me}
      CORS_ALLOWED_ORIGINS: http://localhost:8501
      TRUSTED_HOSTS: localhost,127.0.0.1,backend
      RATE_LIMIT_REQUESTS: 120
      RATE_LIMIT_WINDOW_SECONDS: 60
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      FRONTEND_BACKEND_URL: http://backend:8000
      FRONTEND_API_TOKEN: ${API_AUTH_TOKEN:-change-me}
    ports:
      - "8501:8501"

volumes:
  postgres_data:
